<!DOCTYPE html>
<html>
<head>
    <title>Bus Route Optimizer - {{ region_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚍</text></svg>">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h1>🚍 Bus Route Optimizer</h1>
                <p class="subtitle">{{ region_name }}</p>
            </div>
            <a href="/" class="region-button" style="margin: 0;">← Change Region</a>
        </div>

        <nav>
            <a href="/route/{{ region }}">Route Finder</a>
            <a href="/network/{{ region }}">Network Map</a>
        </nav>

        <form id="routeForm" onsubmit="return false;" style="display: inline-block; width: 100%; max-width: 500px;">
            <div class="form-group">
                <label>Algorithm:</label>
                <select id="algorithm">
                    <option value="dijkstra">Dijkstra (Guaranteed Optimal)</option>
                    <option value="a_star">A* (Heuristic Optimized)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Your Location:</label>
                <button type="button" id="getLocationBtn" class="location-btn">📍 Get My Location</button>
                <div id="locationInfo" style="display: none; margin-top: 10px; padding: 10px; background: rgba(76, 175, 80, 0.1); border-radius: 8px; border-left: 4px solid #4CAF50;">
                    <p id="nearestStopInfo" style="margin: 0; color: #4CAF50;"></p>
                </div>
            </div>

            <div class="form-group">
                <label>Start Stop:</label>
                <select id="start" required>
                    <option value="">Select Start Stop</option>
                    {% for stop in stops %}
                    <option value="{{ stop }}">{{ stop }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>End Stop:</label>
                <select id="end" required>
                    <option value="">Select End Stop</option>
                    {% for stop in stops %}
                    <option value="{{ stop }}">{{ stop }}</option>
                    {% endfor %}
                </select>
                <div id="routeDistanceInfo" style="display: none; margin-top: 10px; padding: 10px; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border-left: 4px solid #667eea;">
                    <p id="routeDistanceText" style="margin: 0; color: #667eea;"></p>
                </div>
            </div>

            <button type="button" id="findRouteBtn">Find Optimal Route</button>
        </form>

        <div id="loading" style="display: none; text-align: center; margin-top: 20px;">
            <p style="color: white; font-size: 1.1em;">🔍 Calculating route...</p>
        </div>

        <div id="error" style="display: none;"></div>
        <div id="result" style="display: none;"></div>
        <div id="googleDistance" style="display: none; margin-top: 16px; color: white; font-weight: 600;"></div>
        <div id="googleMap" style="display: none; height: 600px; margin-top: 30px;"></div>
    </div>

    <script>
    const region = "{{ region }}";
    let userLocation = null;
    let nearestStop = null;
    let googleMap = null;
    let directionsService = null;
    let directionsRenderer = null;

    // Get user's location
    document.getElementById('getLocationBtn').addEventListener('click', function() {
        if (navigator.geolocation) {
            this.innerHTML = '📍 Getting location...';
            this.disabled = true;
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    
                    // Find nearest stop
                    findNearestStop();
                },
                function(error) {
                    let errorMessage = 'Unable to get your location. ';
                    if (error.code === error.PERMISSION_DENIED) {
                        errorMessage += 'Please allow location access in your browser settings.';
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        errorMessage += 'Location information is unavailable.';
                    } else if (error.code === error.TIMEOUT) {
                        errorMessage += 'Location request timed out.';
                    } else {
                        errorMessage += error.message;
                    }
                    showError(errorMessage);
                    document.getElementById('getLocationBtn').innerHTML = '📍 Get My Location';
                    document.getElementById('getLocationBtn').disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 300000
                }
            );
        } else {
            showError('Geolocation is not supported by this browser');
        }
    });

    // Find nearest stop to user's location
    function findNearestStop() {
        if (!userLocation) return;
        
        fetch('/api/get-nearest-stop', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                lat: userLocation.lat,
                lon: userLocation.lon,
                region: region
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                showError(data.error);
            } else {
                nearestStop = data;
                document.getElementById('nearestStopInfo').innerHTML = 
                    `📍 Nearest stop: <strong>${data.nearest_stop}</strong><br>` +
                    `📏 Distance: <strong>${data.distance} km</strong> from your location`;
                document.getElementById('locationInfo').style.display = 'block';
                
                // Auto-select the nearest stop as start
                document.getElementById('start').value = data.nearest_stop;
            }
            document.getElementById('getLocationBtn').innerHTML = '📍 Location Found!';
            document.getElementById('getLocationBtn').disabled = false;
        })
        .catch(error => {
            showError('Error finding nearest stop: ' + error);
            document.getElementById('getLocationBtn').innerHTML = '📍 Get My Location';
            document.getElementById('getLocationBtn').disabled = false;
        });
    }

    // Calculate route distance when destination is selected
    document.getElementById('end').addEventListener('change', function() {
        const start = document.getElementById('start').value;
        const end = this.value;
        
        if (start && end && start !== end) {
            // Quick distance calculation for preview
            fetch('/api/find-route', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    region: region,
                    start: start,
                    end: end,
                    algorithm: 'dijkstra'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.error) {
                    document.getElementById('routeDistanceText').innerHTML = 
                        `🚍 Total route distance: <strong>${data.distance} km</strong><br>` +
                        `⏱️ Estimated time: <strong>${data.time} hours</strong> (40 km/h)`;
                    document.getElementById('routeDistanceInfo').style.display = 'block';
                }
            })
            .catch(error => {
                console.log('Error calculating preview distance:', error);
            });
        } else {
            document.getElementById('routeDistanceInfo').style.display = 'none';
        }
    });

    document.getElementById('findRouteBtn').addEventListener('click', function() {
        findRoute();
    });

    function findRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        const algorithm = document.getElementById('algorithm').value;

        if (!start || !end) {
            showError('Please select both start and end stops');
            return;
        }

        if (start === end) {
            showError('Start and end stops must be different');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        document.getElementById('googleMap').style.display = 'none';

        fetch('/api/find-route', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                region: region,
                start: start,
                end: end,
                algorithm: algorithm
            })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            if (data.error) {
                showError(data.error);
            } else {
                showResult(data);
                showMap(data);
            }
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            showError('Error finding route: ' + error);
        });
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `
            <div class="result error">
                <h2>⚠️ Error</h2>
                <p>${message}</p>
            </div>
        `;
        errorDiv.style.display = 'block';
    }

    function showResult(data) {
        const resultDiv = document.getElementById('result');
        const pathHtml = data.path.map(stop => 
            `<span style="display: inline-block; background: #667eea; color: white; padding: 5px 10px; margin: 2px; border-radius: 15px; font-size: 0.9em;">${stop}</span>`
        ).join('<span style="color: #667eea; margin: 0 5px;">→</span>');

        window.currentRouteData = data;
        resultDiv.innerHTML = `
            <div class="result">
                <h2>✅ Optimal Route Found!</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <p><strong>Algorithm:</strong> ${data.algorithm.charAt(0).toUpperCase() + data.algorithm.slice(1)}</p>
                        <p><strong>Total Distance:</strong> ${data.distance} km</p>
                        <p><strong>Bus Stops:</strong> ${data.stops}</p>
                    </div>
                    <div>
                        <p><strong>Estimated Time:</strong> ${data.time} hours</p>
                        <p><strong>Average Speed:</strong> 40 km/h</p>
                        ${data.comparison ? `<p><strong>Comparison:</strong> ${data.comparison}</p>` : ''}
                    </div>
                </div>
                <p><strong>Route Path:</strong></p>
                <div style="background: rgba(102, 126, 234, 0.1); padding: 15px; border-radius: 8px; margin: 10px 0;">
                    ${pathHtml}
                </div>
                <div style="margin-bottom: 10px;">
                    <label for="bookingName"><strong>Your Name</strong></label><br>
                    <input id="bookingName" type="text" placeholder="Enter your name" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;" />
                </div>
                <button onclick="bookRoute()" style="margin-top: 10px; margin-right: 10px; background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">✅ Book Route</button>
                <button onclick="openRouteInGoogleMaps()" style="margin-top: 10px; background: linear-gradient(45deg, #4CAF50, #45a049); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer;">🗺️ Open Google Maps Link</button>
                <div id="bookingStatus" style="margin-top: 12px; display: none;"></div>
            </div>
        `;
        resultDiv.style.display = 'block';
    }

    function loadGoogleMapsApi() {
        console.log('Google Maps API Key:', '{{ google_maps_api_key }}');
        if (window.google && window.google.maps) {
            initGoogleMap();
            return;
        }

        if (document.getElementById('googleMapsScript')) {
            return;
        }

        const apiKey = '{{ google_maps_api_key }}'; // replace with valid API key
        const script = document.createElement('script');
        script.id = 'googleMapsScript';
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initGoogleMap`;
        script.defer = true;
        script.async = true;
        script.onerror = function() {
            document.getElementById('googleDistance').style.display = 'block';
            document.getElementById('googleDistance').innerText = 'Google Maps API failed to load. Check API key.';
        };
        document.head.appendChild(script);
    }

    function initGoogleMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer();
        googleMap = new google.maps.Map(document.getElementById('googleMap'), {
            center: { lat: 20.5937, lng: 78.9629 },
            zoom: 5
        });
        directionsRenderer.setMap(googleMap);

        if (window.currentRouteData) {
            renderGoogleMapRoute(window.currentRouteData);
        }
    }

    function renderGoogleMapRoute(data) {
        if (!data || !data.coordinates || data.coordinates.length < 2) {
            document.getElementById('googleDistance').style.display = 'block';
            document.getElementById('googleDistance').innerText = 'Route data missing';
            return;
        }

        document.getElementById('googleMap').style.display = 'block';
        document.getElementById('googleDistance').style.display = 'block';

        const origin = { lat: data.coordinates[0][0], lng: data.coordinates[0][1] };
        const destinationPoint = data.coordinates[data.coordinates.length - 1];
        const destination = { lat: destinationPoint[0], lng: destinationPoint[1] };
        const waypoints = data.coordinates.slice(1, -1).map(([lat, lng]) => ({ location: { lat, lng }, stopover: false }));

        directionsService.route({
            origin: origin,
            destination: destination,
            waypoints: waypoints,
            travelMode: google.maps.TravelMode.DRIVING,
            optimizeWaypoints: false
        }, function(response, status) {
            if (status === google.maps.DirectionsStatus.OK || status === 'OK') {
                directionsRenderer.setDirections(response);

                let totalDistance = 0;
                let totalDuration = 0;
                response.routes[0].legs.forEach(leg => {
                    totalDistance += leg.distance.value;
                    totalDuration += leg.duration.value;
                });

                const km = (totalDistance / 1000).toFixed(2);
                const hours = (totalDuration / 3600).toFixed(2);
                document.getElementById('googleDistance').innerText = `Google map distance: ${km} km, ${hours} h`;

                // Update routeData distance for booking accuracy
                window.currentRouteData.google_distance = parseFloat(km);
                window.currentRouteData.google_duration = parseFloat(hours);
            } else {
                document.getElementById('googleDistance').innerText = `Google route error: ${status}`;
            }
        });
    }

    function showMap(data) {
        window.currentRouteData = data;
        document.getElementById('googleMap').style.display = 'block';
        document.getElementById('googleDistance').style.display = 'block';
        loadGoogleMapsApi();

        if (window.google && window.google.maps && directionsService) {
            renderGoogleMapRoute(data);
        }
    }

    function bookRoute() {
        const bookingName = document.getElementById('bookingName').value.trim() || 'Anonymous';
        const statusDiv = document.getElementById('bookingStatus');

        if (!window.currentRouteData) {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<p style="color: #e74c3c;">Please calculate route first before booking.</p>';
            return;
        }

        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;

        fetch('/api/book-route', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: bookingName,
                region: region,
                start: start,
                end: end,
                algorithm: window.currentRouteData.algorithm,
                distance: window.currentRouteData.distance,
                path: window.currentRouteData.path,
                map_link: window.currentRouteData.map_link
            })
        })
        .then(response => response.json())
        .then(data => {
            statusDiv.style.display = 'block';
            if (data.error) {
                statusDiv.innerHTML = `<p style="color: #e74c3c;">Booking failed: ${data.error}</p>`;
            } else {
                statusDiv.innerHTML = `
                    <p style="color: #2ecc71;">${data.message}</p>
                    <p><a href="${data.map_link}" target="_blank" style="color: #ffffff; background: #3498db; padding: 8px 12px; border-radius: 6px; text-decoration:none;">Open Google Maps Directions</a></p>
                    <p style="color: #f1c40f;">Booking ID: ${data.booking_id}</p>
                `;
            }
        })
        .catch(error => {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `<p style="color: #e74c3c;">Booking API error: ${error}</p>`;
        });
    }

    function openRouteInGoogleMaps() {
        if (!window.currentRouteData || !window.currentRouteData.map_link) {
            showError('Google Maps link not available. Please recalc route.');
            return;
        }
        window.open(window.currentRouteData.map_link, '_blank');
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (window.currentRouteData) {
            showMap(window.currentRouteData);
        }
    });
    </script>
</body>
</html>
